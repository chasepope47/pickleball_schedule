<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeStreets Pickleball Schedule</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Auth overlay (sign-in / create account) ── -->
  <div class="welcome-overlay hidden" id="welcomeOverlay">
    <div class="auth-card">

      <div class="welcome-logo">
        <svg viewBox="0 0 24 24"><path d="M12 1.5L3 5.25V11c0 5.25 3.9 10.15 9 11.25C17.1 21.15 21 16.25 21 11V5.25L12 1.5z"/></svg>
      </div>
      <h2>SafeStreets</h2>
      <p class="welcome-sub">Pickleball Court Reservations</p>

      <!-- ── Sign In ── -->
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@safestreets.com"
               autocomplete="email" />
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••"
               autocomplete="current-password" />
      </div>
      <div class="auth-error hidden" id="loginError"></div>
      <button class="btn btn-primary btn-full" id="loginBtn">Sign In →</button>
      <button class="forgot-link" id="forgotBtn">Forgot password?</button>

    </div>
  </div>

  <!-- ── Header ── -->
  <header>
    <div class="logo-badge">
      <svg viewBox="0 0 24 24"><path d="M12 1.5L3 5.25V11c0 5.25 3.9 10.15 9 11.25C17.1 21.15 21 16.25 21 11V5.25L12 1.5z"/></svg>
    </div>
    <div class="header-text">
      <h1>SafeStreets</h1>
      <p>Pickleball Court Schedule</p>
    </div>

    <div class="header-right">
      <button class="btn-admin" id="adminBtn" title="Admin panel" style="display:none">⚙️</button>
      <button class="btn-leaderboard" id="leaderboardBtn" title="View leaderboard">🏆</button>
      <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode">
        <svg id="themeIconDark" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="themeIconLight" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
      <div class="user-pill" id="userPill" title="Edit profile">
        <div class="user-avatar" id="userAvatar"></div>
        <span class="user-name" id="userNameLabel"></span>
        <svg class="edit-icon" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
      </div>
    </div>
  </header>

  <!-- ── Main content ── -->
  <main>
    <div class="week-bar">
      <h2 id="weekLabel"></h2>
      <span class="reset-badge" id="resetLabel"></span>
    </div>

    <div class="day-tabs" id="dayTabs"></div>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot dot-open"></div> Available / Joinable</div>
      <div class="legend-item"><div class="legend-dot dot-booked"></div> Your Spot</div>
      <div class="legend-item"><div class="legend-dot dot-past"></div> Full / Past</div>
    </div>

    <div class="courts-grid">
      <div class="court-card">
        <div class="court-header">
          <span class="court-icon">🏓</span>
          <h3>Court 1</h3>
          <span class="slots-free" id="free1">—</span>
        </div>
        <div class="slot-list" id="slots1"></div>
      </div>
      <div class="court-card">
        <div class="court-header">
          <span class="court-icon">🏓</span>
          <h3>Court 2</h3>
          <span class="slots-free" id="free2">—</span>
        </div>
        <div class="slot-list" id="slots2"></div>
      </div>
    </div>
  </main>

  <footer>SafeStreets &mdash; Internal Use Only &mdash; Resets every Monday</footer>

  <!-- ── Shared modal shell ── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h4 id="modalTitle"></h4>
      <p class="modal-sub" id="modalSub"></p>
      <div id="modalBody"></div>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
