<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeStreets Pickleball Schedule</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header>
    <div class="logo-badge">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 1.5L3 5.25V11c0 5.25 3.9 10.15 9 11.25C17.1 21.15 21 16.25 21 11V5.25L12 1.5z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>SafeStreets</h1>
      <p>Pickleball Court Schedule</p>
    </div>
  </header>

  <!-- ── Notification permission banner ── -->
  <div id="notifBanner">
    <span>🔔 Enable browser notifications to get a 30-minute reminder before your court time.</span>
    <button onclick="enableNotifications()">Enable Reminders</button>
  </div>

  <!-- ── Main content ── -->
  <main>

    <!-- Week label + reset countdown -->
    <div class="week-bar">
      <h2 id="weekLabel"></h2>
      <span class="reset-badge" id="resetLabel"></span>
    </div>

    <!-- Mon–Sun day selector tabs (built by JS) -->
    <div class="day-tabs" id="dayTabs"></div>

    <!-- Color legend -->
    <div class="legend">
      <div class="legend-item"><div class="legend-dot dot-open"></div> Available</div>
      <div class="legend-item"><div class="legend-dot dot-booked"></div> Reserved</div>
      <div class="legend-item"><div class="legend-dot dot-past"></div> Past</div>
    </div>

    <!-- Two court columns (slots built by JS) -->
    <div class="courts-grid">

      <div class="court-card">
        <div class="court-header">
          <span class="court-icon">🏓</span>
          <h3>Court 1</h3>
          <span class="slots-free" id="free1"></span>
        </div>
        <div class="slot-list" id="slots1"></div>
      </div>

      <div class="court-card">
        <div class="court-header">
          <span class="court-icon">🏓</span>
          <h3>Court 2</h3>
          <span class="slots-free" id="free2"></span>
        </div>
        <div class="slot-list" id="slots2"></div>
      </div>

    </div>
  </main>

  <footer>SafeStreets &mdash; Internal Use Only &mdash; Resets every Monday</footer>

  <!-- ── Reservation / cancel modal ── -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <h4 id="modalTitle"></h4>
      <p class="modal-sub" id="modalSub"></p>
      <div id="modalBody"></div>
      <div class="modal-actions" id="modalActions"></div>
    </div>
  </div>

  <!-- ES module — enables Firebase SDK imports in app.js -->
  <script type="module" src="app.js"></script>

</body>
</html>
