<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SafeStreets Pickleball Schedule</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:       #0a0a0a;
      --black-card:  #141414;
      --black-panel: #1c1c1c;
      --black-hover: #222222;
      --cyan:        #00d4e8;
      --cyan-dim:    #00a8bc;
      --cyan-glow:   rgba(0, 212, 232, 0.35);
      --cyan-bg:     rgba(0, 212, 232, 0.08);
      --cyan-border: rgba(0, 212, 232, 0.3);
      --orange:      #ff9800;
      --orange-bg:   rgba(255, 152, 0, 0.1);
      --orange-border: rgba(255, 152, 0, 0.35);
      --red:         #e53935;
      --text:        #e8e8e8;
      --text-dim:    #888;
      --text-muted:  #555;
      --border:      #2a2a2a;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--black);
      min-height: 100vh;
      color: var(--text);
    }

    /* ── Header ── */
    header {
      background: #000;
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 18px;
      box-shadow: 0 0 30px rgba(0, 212, 232, 0.08);
    }

    .logo-badge {
      width: 52px; height: 52px;
      background: #000;
      border-radius: 50%;
      border: 2.5px solid var(--cyan);
      box-shadow: 0 0 14px var(--cyan-glow), inset 0 0 10px rgba(0,212,232,0.05);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .logo-badge svg {
      width: 26px; height: 26px;
      fill: #fff;
      filter: drop-shadow(0 0 4px rgba(0,212,232,0.6));
    }

    .header-text h1 {
      font-size: 1.5rem; font-weight: 800;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .header-text p {
      font-size: 0.82rem;
      color: var(--cyan);
      margin-top: 2px;
      letter-spacing: 0.3px;
    }

    /* ── Notification banner ── */
    #notifBanner {
      background: rgba(0, 212, 232, 0.07);
      border-bottom: 1px solid var(--cyan-border);
      padding: 10px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      font-size: 0.83rem;
      color: var(--cyan);
    }
    #notifBanner.hidden { display: none; }
    #notifBanner button {
      background: var(--cyan); color: #000;
      border: none; border-radius: 6px;
      padding: 6px 14px; font-size: 0.8rem; font-weight: 800; cursor: pointer;
      flex-shrink: 0; transition: opacity 0.15s;
    }
    #notifBanner button:hover { opacity: 0.85; }

    /* ── Main ── */
    main { max-width: 1140px; margin: 0 auto; padding: 28px 20px; }

    /* ── Week bar ── */
    .week-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 18px; flex-wrap: wrap; gap: 10px;
    }
    .week-bar h2 { font-size: 0.95rem; color: var(--text); font-weight: 700; }
    .reset-badge {
      font-size: 0.73rem; color: var(--text-dim);
      background: var(--black-card); border: 1px solid var(--border);
      border-radius: 20px; padding: 3px 12px;
    }

    /* ── Day tabs ── */
    .day-tabs {
      display: flex; gap: 6px; margin-bottom: 22px;
      overflow-x: auto; padding-bottom: 2px;
    }
    .day-tab {
      flex-shrink: 0;
      background: var(--black-card); border: 1px solid var(--border);
      border-radius: 10px; padding: 8px 14px;
      cursor: pointer; text-align: center;
      transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
      min-width: 70px;
      color: var(--text-dim);
    }
    .day-tab:hover {
      border-color: var(--cyan);
      color: var(--text);
    }
    .day-tab.active {
      background: var(--cyan); border-color: var(--cyan); color: #000;
      box-shadow: 0 0 12px var(--cyan-glow);
      font-weight: 700;
    }
    .day-tab .day-name { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .day-tab .day-date { font-size: 0.9rem; font-weight: 700; margin-top: 2px; }
    .day-tab.today-tab:not(.active) { border-color: var(--cyan-dim); color: var(--cyan); }

    /* ── Courts grid ── */
    .courts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    @media (max-width: 700px) { .courts-grid { grid-template-columns: 1fr; } }

    .court-card {
      background: var(--black-card);
      border-radius: 14px;
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .court-header {
      background: #000;
      border-bottom: 1px solid var(--border);
      padding: 13px 18px;
      display: flex; align-items: center; gap: 10px;
    }
    .court-icon { font-size: 1.1rem; }
    .court-header h3 { font-size: 0.95rem; font-weight: 700; color: #fff; }
    .slots-free {
      margin-left: auto; font-size: 0.72rem;
      background: var(--cyan); color: #000;
      padding: 3px 10px; border-radius: 20px; font-weight: 800;
    }

    .slot-list { padding: 10px; display: flex; flex-direction: column; gap: 5px; }

    /* ── Slots ── */
    .slot {
      display: flex; align-items: center;
      padding: 9px 12px; border-radius: 8px;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.1s, border-color 0.15s;
      border: 1px solid transparent;
      user-select: none;
    }
    .slot:hover { transform: translateY(-1px); }

    .slot.open {
      background: var(--cyan-bg);
      border-color: var(--cyan-border);
    }
    .slot.open:hover {
      border-color: var(--cyan);
      box-shadow: 0 0 10px var(--cyan-glow);
    }
    .slot.booked {
      background: var(--orange-bg);
      border-color: var(--orange-border);
    }
    .slot.booked:hover {
      border-color: var(--orange);
      box-shadow: 0 0 8px rgba(255,152,0,0.2);
    }
    .slot.past { opacity: 0.3; cursor: default; pointer-events: none; }

    .slot-time   { font-size: 0.8rem; font-weight: 700; width: 108px; flex-shrink: 0; color: var(--text-dim); }
    .slot-status { font-size: 0.8rem; flex: 1; }
    .slot.open   .slot-status { color: var(--cyan); }
    .slot.booked .slot-status { color: var(--orange); font-weight: 600; }
    .slot-action { font-size: 0.7rem; color: var(--text-muted); flex-shrink: 0; margin-left: 6px; }

    /* ── Legend ── */
    .legend {
      display: flex; gap: 16px; align-items: center;
      font-size: 0.78rem; color: var(--text-dim);
      margin-bottom: 20px; flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot  { width: 12px; height: 12px; border-radius: 4px; }
    .dot-open    { background: var(--cyan-bg); border: 1px solid var(--cyan); }
    .dot-booked  { background: var(--orange-bg); border: 1px solid var(--orange); }
    .dot-past    { background: #1a1a1a; border: 1px solid #333; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 100;
      align-items: center; justify-content: center;
      backdrop-filter: blur(3px);
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--black-panel);
      border: 1px solid var(--border);
      border-radius: 14px; padding: 28px 24px;
      width: 100%; max-width: 420px;
      box-shadow: 0 0 40px rgba(0,212,232,0.1), 0 20px 50px rgba(0,0,0,0.6);
      animation: pop 0.18s ease-out;
    }
    @keyframes pop {
      from { transform: scale(0.92); opacity: 0; }
      to   { transform: scale(1);    opacity: 1; }
    }
    .modal h4 { font-size: 1rem; color: #fff; margin-bottom: 4px; font-weight: 700; }
    .modal .modal-sub { font-size: 0.8rem; color: var(--cyan); margin-bottom: 18px; }

    .form-row { display: flex; gap: 10px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; flex: 1; margin-bottom: 14px; }
    .form-group label { font-size: 0.76rem; font-weight: 700; color: var(--text-dim); }
    .form-group input {
      padding: 9px 12px;
      background: var(--black-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    .form-group input::placeholder { color: var(--text-muted); }
    .form-group input:focus {
      border-color: var(--cyan);
      box-shadow: 0 0 8px var(--cyan-glow);
    }
    .form-group input.error { border-color: var(--red); }

    .notif-opt {
      background: rgba(0,212,232,0.06);
      border: 1px solid var(--cyan-border);
      border-radius: 8px; padding: 10px 14px;
      margin-bottom: 14px; font-size: 0.79rem; color: var(--cyan);
      display: flex; align-items: center; gap: 8px;
    }
    .notif-opt input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; flex-shrink: 0; accent-color: var(--cyan); }
    .notif-opt label { cursor: pointer; user-select: none; }

    .modal-actions { display: flex; gap: 10px; margin-top: 4px; }
    .btn {
      padding: 10px 18px; border: none; border-radius: 8px;
      font-size: 0.86rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn-primary {
      background: var(--cyan); color: #000; flex: 1;
      box-shadow: 0 0 12px var(--cyan-glow);
    }
    .btn-primary:hover { box-shadow: 0 0 20px var(--cyan-glow); }
    .btn-danger    { background: var(--red); color: #fff; flex: 1; }
    .btn-secondary { background: var(--black-hover); color: var(--text); border: 1px solid var(--border); }

    footer {
      text-align: center; padding: 24px;
      font-size: 0.75rem; color: var(--text-muted);
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<header>
  <div class="logo-badge">
    <!-- Shield SVG matching the SafeStreets logo -->
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 1.5L3 5.25V11c0 5.25 3.9 10.15 9 11.25C17.1 21.15 21 16.25 21 11V5.25L12 1.5z"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>SafeStreets</h1>
    <p>Pickleball Court Schedule</p>
  </div>
</header>

<div id="notifBanner">
  <span>🔔 Enable browser notifications to get a 30-minute reminder before your court time.</span>
  <button onclick="enableNotifications()">Enable Reminders</button>
</div>

<main>
  <div class="week-bar">
    <h2 id="weekLabel"></h2>
    <span class="reset-badge" id="resetLabel"></span>
  </div>

  <div class="day-tabs" id="dayTabs"></div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot dot-open"></div> Available</div>
    <div class="legend-item"><div class="legend-dot dot-booked"></div> Reserved</div>
    <div class="legend-item"><div class="legend-dot dot-past"></div> Past</div>
  </div>

  <div class="courts-grid">
    <div class="court-card">
      <div class="court-header">
        <span class="court-icon">🏓</span>
        <h3>Court 1</h3>
        <span class="slots-free" id="free1"></span>
      </div>
      <div class="slot-list" id="slots1"></div>
    </div>
    <div class="court-card">
      <div class="court-header">
        <span class="court-icon">🏓</span>
        <h3>Court 2</h3>
        <span class="slots-free" id="free2"></span>
      </div>
      <div class="slot-list" id="slots2"></div>
    </div>
  </div>
</main>

<footer>SafeStreets &mdash; Internal Use Only &mdash; Resets every Monday</footer>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h4 id="modalTitle"></h4>
    <p class="modal-sub" id="modalSub"></p>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<script>
const HOURS = Array.from({ length: 16 }, (_, i) => i + 6);

function fmtHour(h) {
  const p = h < 12 ? 'AM' : 'PM';
  const d = h === 0 ? 12 : h > 12 ? h - 12 : h;
  return `${d}:00 ${p}`;
}

function slotLabel(h) {
  return `${fmtHour(h)} – ${fmtHour(h + 1)}`;
}

function getMondayOf(date) {
  const d = new Date(date);
  d.setHours(0, 0, 0, 0);
  const day = d.getDay();
  d.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return d;
}

function isoDate(d) { return d.toISOString().slice(0, 10); }

const WEEK_MONDAY = getMondayOf(new Date());
const WEEK_KEY    = 'ss_pickleball_' + isoDate(WEEK_MONDAY);

const DAY_NAMES = ['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
const DAY_SHORT = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

function dayDate(dayIdx) {
  const d = new Date(WEEK_MONDAY);
  d.setDate(d.getDate() + dayIdx);
  return d;
}

function slotDateTime(dayIdx, hour) {
  const d = dayDate(dayIdx);
  d.setHours(hour, 0, 0, 0);
  return d;
}

// ── Persistence ───────────────────────────────────────────────────────────────

let data = { 1: {}, 2: {} };
try {
  const raw = localStorage.getItem(WEEK_KEY);
  if (raw) data = JSON.parse(raw);
} catch (_) {}

function save() {
  localStorage.setItem(WEEK_KEY, JSON.stringify(data));
  for (const k of Object.keys(localStorage)) {
    if (k.startsWith('ss_pickleball_') && k !== WEEK_KEY) localStorage.removeItem(k);
  }
}

function getRes(court, dayIdx, hour) { return (data[court][dayIdx] || {})[hour]; }

function setRes(court, dayIdx, hour, value) {
  if (!data[court][dayIdx]) data[court][dayIdx] = {};
  data[court][dayIdx][hour] = value;
  save();
}

function delRes(court, dayIdx, hour) {
  if (data[court][dayIdx]) delete data[court][dayIdx][hour];
  save();
}

// ── Day state ─────────────────────────────────────────────────────────────────

const todayDayIdx = (() => { const d = new Date().getDay(); return d === 0 ? 6 : d - 1; })();
let selectedDay = todayDayIdx;

// ── Notifications ─────────────────────────────────────────────────────────────

const timers = {};
function timerKey(court, dayIdx, hour) { return `${court}_${dayIdx}_${hour}`; }

function scheduleNotif(court, dayIdx, hour, res) {
  if (!res || !res.notif) return;
  const alertAt = slotDateTime(dayIdx, hour).getTime() - 30 * 60 * 1000;
  if (alertAt <= Date.now()) return;
  const key = timerKey(court, dayIdx, hour);
  clearTimeout(timers[key]);
  timers[key] = setTimeout(() => {
    if (Notification.permission === 'granted') {
      new Notification('SafeStreets Pickleball – 30 min reminder', {
        body: `${res.firstName} ${res.lastName}, your Court ${court} slot starts at ${fmtHour(hour)} today!`
      });
    }
  }, alertAt - Date.now());
}

function cancelNotif(court, dayIdx, hour) {
  const key = timerKey(court, dayIdx, hour);
  clearTimeout(timers[key]);
  delete timers[key];
}

function rescheduleAll() {
  for (const court of [1, 2]) {
    for (const [di, hours] of Object.entries(data[court])) {
      for (const [h, res] of Object.entries(hours)) {
        if (res) scheduleNotif(court, +di, +h, res);
      }
    }
  }
}

function updateNotifBanner() {
  if (!('Notification' in window) || Notification.permission !== 'default') {
    document.getElementById('notifBanner').classList.add('hidden');
  }
}

function enableNotifications() {
  if (!('Notification' in window)) return;
  Notification.requestPermission().then(() => { updateNotifBanner(); rescheduleAll(); });
}

// ── Render ────────────────────────────────────────────────────────────────────

function buildDayTabs() {
  const container = document.getElementById('dayTabs');
  container.innerHTML = '';
  for (let i = 0; i < 7; i++) {
    const d   = dayDate(i);
    const tab = document.createElement('div');
    tab.className = 'day-tab' +
      (i === selectedDay ? ' active'    : '') +
      (i === todayDayIdx ? ' today-tab' : '');
    tab.innerHTML = `<div class="day-name">${DAY_SHORT[i]}</div><div class="day-date">${d.getDate()}</div>`;
    tab.addEventListener('click', () => { selectedDay = i; render(); });
    container.appendChild(tab);
  }
}

function buildSlots(court) {
  const container = document.getElementById(`slots${court}`);
  const freeEl    = document.getElementById(`free${court}`);
  container.innerHTML = '';
  let freeCount = 0;
  const now = new Date();

  HOURS.forEach(hour => {
    const slotEnd = slotDateTime(selectedDay, hour + 1);
    const isPast  = slotEnd <= now;
    const res     = getRes(court, selectedDay, hour);
    const isOpen  = !res;
    if (isOpen && !isPast) freeCount++;

    const slot = document.createElement('div');
    slot.className = `slot ${isPast ? 'past' : isOpen ? 'open' : 'booked'}`;
    slot.innerHTML = `
      <span class="slot-time">${slotLabel(hour)}</span>
      <span class="slot-status">${isOpen ? (isPast ? 'Elapsed' : 'Available') : `${res.firstName} ${res.lastName}`}</span>
      <span class="slot-action">${isPast ? '' : isOpen ? 'Reserve →' : 'Cancel ✕'}</span>
    `;
    if (!isPast) {
      slot.addEventListener('click', () => {
        if (isOpen) openReserveModal(court, selectedDay, hour);
        else        openCancelModal(court, selectedDay, hour, res);
      });
    }
    container.appendChild(slot);
  });

  freeEl.textContent = `${freeCount} open`;
}

function render() {
  buildDayTabs();
  buildSlots(1);
  buildSlots(2);
}

function buildWeekLabels() {
  const end  = dayDate(6);
  const opts = { month: 'short', day: 'numeric' };
  const s    = WEEK_MONDAY.toLocaleDateString('en-US', opts);
  const e    = end.toLocaleDateString('en-US', opts);
  document.getElementById('weekLabel').textContent = `Week of ${s} – ${e}`;
  const nextMonday = new Date(WEEK_MONDAY);
  nextMonday.setDate(nextMonday.getDate() + 7);
  const diff = Math.ceil((nextMonday - new Date()) / (1000 * 60 * 60 * 24));
  document.getElementById('resetLabel').textContent = `Resets in ${diff} day${diff !== 1 ? 's' : ''}`;
}

// ── Modals ────────────────────────────────────────────────────────────────────

function openReserveModal(court, dayIdx, hour) {
  const notifAvail   = 'Notification' in window;
  const notifGranted = notifAvail && Notification.permission === 'granted';

  document.getElementById('modalTitle').textContent = `Reserve Court ${court}`;
  document.getElementById('modalSub').textContent   =
    `${DAY_NAMES[dayIdx]}, ${dayDate(dayIdx).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })} · ${slotLabel(hour)}`;

  document.getElementById('modalBody').innerHTML = `
    <div class="form-row">
      <div class="form-group">
        <label for="firstNameInput">First Name</label>
        <input type="text" id="firstNameInput" placeholder="Jane" maxlength="40" autocomplete="given-name" />
      </div>
      <div class="form-group">
        <label for="lastNameInput">Last Name</label>
        <input type="text" id="lastNameInput" placeholder="Smith" maxlength="40" autocomplete="family-name" />
      </div>
    </div>
    ${notifAvail ? `
    <div class="notif-opt">
      <input type="checkbox" id="notifCheck" ${notifGranted ? 'checked' : ''} />
      <label for="notifCheck">Remind me 30 minutes before via browser notification</label>
    </div>` : ''}
  `;

  document.getElementById('modalActions').innerHTML = '';
  const cancelBtn  = makeBtn('Cancel', 'btn-secondary', closeModal);
  const confirmBtn = makeBtn('Reserve Slot', 'btn-primary', async () => {
    const fn        = document.getElementById('firstNameInput');
    const ln        = document.getElementById('lastNameInput');
    const firstName = fn.value.trim();
    const lastName  = ln.value.trim();
    let valid = true;
    if (!firstName) { fn.classList.add('error'); valid = false; } else fn.classList.remove('error');
    if (!lastName)  { ln.classList.add('error'); valid = false; } else ln.classList.remove('error');
    if (!valid) return;

    const wantsNotif = notifAvail && document.getElementById('notifCheck')?.checked;
    if (wantsNotif && Notification.permission !== 'granted') await Notification.requestPermission();

    const res = { firstName, lastName, notif: wantsNotif };
    setRes(court, dayIdx, hour, res);
    scheduleNotif(court, dayIdx, hour, res);
    updateNotifBanner();
    render();
    closeModal();
  });

  document.getElementById('modalActions').append(cancelBtn, confirmBtn);
  document.getElementById('modalOverlay').classList.add('active');
  setTimeout(() => document.getElementById('firstNameInput')?.focus(), 80);
}

function openCancelModal(court, dayIdx, hour, res) {
  document.getElementById('modalTitle').textContent = 'Cancel Reservation';
  document.getElementById('modalSub').textContent   =
    `Court ${court} · ${DAY_NAMES[dayIdx]} · ${slotLabel(hour)}`;
  document.getElementById('modalBody').innerHTML = `
    <p style="font-size:.86rem;color:#888;line-height:1.6">
      Currently reserved by <strong style="color:#e8e8e8">${res.firstName} ${res.lastName}</strong>.<br>
      Remove this reservation?
    </p>
  `;
  document.getElementById('modalActions').innerHTML = '';

  const keepBtn   = makeBtn('Keep It', 'btn-secondary', closeModal);
  const removeBtn = makeBtn('Cancel Reservation', 'btn-danger', () => {
    cancelNotif(court, dayIdx, hour);
    delRes(court, dayIdx, hour);
    render();
    closeModal();
  });

  document.getElementById('modalActions').append(keepBtn, removeBtn);
  document.getElementById('modalOverlay').classList.add('active');
}

function makeBtn(text, cls, handler) {
  const b = document.createElement('button');
  b.className = `btn ${cls}`;
  b.textContent = text;
  b.addEventListener('click', handler);
  return b;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

// ── Init ──────────────────────────────────────────────────────────────────────

updateNotifBanner();
buildWeekLabels();
rescheduleAll();
render();
setInterval(render, 60 * 1000);
</script>
